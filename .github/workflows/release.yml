name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: bolt-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: bolt-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: bolt-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: bolt-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libfontconfig-dev \
            libgtk-3-dev libayatana-appindicator3-dev

      - name: Build
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Rename binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/bolt ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/bolt.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Generate .deb package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo install cargo-deb
          cargo deb --no-build --no-strip --target ${{ matrix.target }}

      - name: Upload .deb artifact
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: bolt-dm-deb
          path: target/${{ matrix.target }}/debian/*.deb

      - name: Generate .rpm package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo install cargo-generate-rpm
          cp target/${{ matrix.target }}/release/bolt target/release/bolt
          cp target/${{ matrix.target }}/release/bolt-nmh target/release/bolt-nmh
          cargo generate-rpm

      - name: Upload .rpm artifact
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: bolt-dm-rpm
          path: target/generate-rpm/*.rpm

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*

  aur:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare AUR package
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKGVER="${TAG//-/_}"
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" dist/aur/PKGBUILD
          cp dist/bolt.desktop dist/aur/bolt.desktop
          cp dist/bolt.svg dist/aur/bolt.svg

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: bolt-dm-bin
          pkgbuild: dist/aur/PKGBUILD
          assets: |
            dist/aur/bolt.desktop
            dist/aur/bolt.svg
          updpkgsums: false
          commit_username: dasunNimantha
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${GITHUB_REF#refs/tags/v}"
          force_push: true
