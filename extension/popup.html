<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1729;
      color: #e0e0e0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header svg { width: 28px; height: 28px; flex-shrink: 0; }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      background: #1a2744;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .toggle-label { font-size: 13px; color: #c0c8d8; }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #3a4a6a;
      border-radius: 11px;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #F2BF40; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }
    .status {
      font-size: 12px;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      background: #1a2744;
    }
    .status.connected { color: #4ade80; }
    .status.disconnected { color: #f87171; }
    .status.checking { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="8" fill="#F2BF40"/>
      <path d="M27 6L15 27h7.5l-3 15 12-21H24l3-15z" fill="#1A1A1A"/>
    </svg>
    <h1>Bolt</h1>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Intercept Downloads</span>
    <label class="toggle">
      <input type="checkbox" id="enableToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Forward Cookies
      <span style="display:block;font-size:10px;color:#7a889e;margin-top:2px">Needed for authenticated downloads</span>
    </span>
    <label class="toggle">
      <input type="checkbox" id="cookieToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div id="status" class="status checking">Checking connection...</div>

  <script src="popup.js"></script>
</body>
</html>
